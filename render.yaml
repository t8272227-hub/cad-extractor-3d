services:
  - type: web
    name: cad-extractor-3d
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_LOGIN
        generateValue: false
        # Set in Render dashboard → Environment
      - key: APP_PASSWORD
        generateValue: false
        # Set in Render dashboard → Environment
      - key: SESSION_SECRET
        generateValue: true
      - key: ZVENO_API_KEY
        generateValue: false
        # Set in Render dashboard → Environment
    healthCheckPath: /login
    autoDeploy: true
